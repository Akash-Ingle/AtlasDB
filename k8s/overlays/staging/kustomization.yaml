apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: atlasdb-staging

patches:
  - target:
      kind: Deployment
      name: api-server
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: processor
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

configMapGenerator:
  - name: atlas-config
    behavior: merge
    literals:
      - LOG_LEVEL=info
      - AI_ENABLED=true
