apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlasdb
  namespace: atlasdb
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: atlasdb.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-server
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  name: http
