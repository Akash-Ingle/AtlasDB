apiVersion: apps/v1
kind: Deployment
metadata:
  name: processor
  namespace: atlasdb
  labels:
    app: processor
    app.kubernetes.io/name: processor
    app.kubernetes.io/part-of: atlasdb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: processor
  template:
    metadata:
      labels:
        app: processor
    spec:
      containers:
        - name: processor
          image: atlasdb/processor:latest
          envFrom:
            - configMapRef:
                name: atlas-config
            - secretRef:
                name: atlas-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
