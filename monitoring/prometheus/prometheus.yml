global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "atlas-api-server"
    static_configs:
      - targets: ["api-server:8080"]
    metrics_path: /metrics

  - job_name: "atlas-processor"
    static_configs:
      - targets: ["processor:8081"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
