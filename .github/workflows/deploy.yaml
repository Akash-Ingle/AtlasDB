name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/atlasdb

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api-server, processor, worker, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set image tags
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "IMAGE_TAG=${SHORT_SHA}" >> $GITHUB_ENV

      - name: Deploy to staging
        run: |
          echo "Deploying to staging with tag: $IMAGE_TAG"
          # kubectl apply -k k8s/overlays/staging
          # kubectl -n atlasdb-staging set image deployment/api-server api-server=$IMAGE_PREFIX/api-server:$IMAGE_TAG
          # kubectl -n atlasdb-staging rollout status deployment/api-server --timeout=120s

      - name: Smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # curl -sf https://staging.atlasdb.example.com/healthz

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # kubectl apply -k k8s/overlays/production
          # kubectl -n atlasdb-production rollout status deployment/api-server --timeout=180s

      - name: Health check
        run: |
          echo "Running production health checks..."
          # curl -sf https://atlasdb.example.com/readyz || (kubectl -n atlasdb-production rollout undo deployment/api-server && exit 1)
